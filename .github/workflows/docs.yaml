# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Documentation checks

permissions:
  contents: read

on:
  workflow_dispatch:

  pull_request:
    paths:
      - 'docs/**'
      - 'AGENTS.md'
      - 'readme.md'
      - 'api.yml'
      - 'src/app_config.cpp'
      - 'gui-nightshift'
      - 'scripts/docs_*.py'
      - 'scripts/sync_screenshots.py'
      - '.github/workflows/docs.yaml'

jobs:
  docs:
    name: Links, screenshots, coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.x'

      - name: Check relative links
        run: python scripts/docs_linkcheck.py

      - name: Check user-guide screenshots match the generated set
        run: python scripts/sync_screenshots.py --check

      # Every config option, UI route, and API path must be mentioned in the
      # docs. Strict: a new feature lands with its documentation.
      - name: Documentation coverage
        run: python scripts/docs_coverage.py --strict
