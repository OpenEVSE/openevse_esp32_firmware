# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build/Release OpenEVSE

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Dump the environment
        run: echo "Environment variables:" && env | sort

      - name: Dump the event
        run: cat $GITHUB_EVENT_PATH

      - name: Dump github.ref_name
        run: echo "github.ref_name = '${{ github.ref_name }}'"

  test:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Cache pip
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: Run native unit tests
      run: pio test -e native_test --junit-output-path=pio_test_results.xml

    - name : Upload test results
      uses: actions/upload-artifact@v7
      with:
        name: pio_test_results
        path: |
          pio_test_results.xml

  build:
    name: Build ${{ matrix.env }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env:
          - nodemcu-32s
          - espressif_esp-wrover-kit
          - espressif_esp-wrover-kit_latest
          - adafruit_huzzah32_dev
          - adafruit_huzzah32
          - adafruit_featheresp32
          - openevse_wifi_v1
          - olimex_esp32-gateway-old
          - olimex_esp32-gateway-e
          - olimex_esp32-gateway-f
          - olimex_esp32-gateway-e_dev
          - olimex_esp32-gateway-f_dev
          - olimex_esp32-poe-iso
          - heltec_esp32-wifi-lora-v2
          - wt32-eth01
          - esp32-c3-devkitc-02
          - elecrow_esp32_hmi
#          - elecrow_esp32_hmi_dev
          - openevse_wifi_tft_v1
          - openevse_wifi_tft_v1_dev
          # core-3.x (pioarduino / IDF5) — 16MB+ boards
          - openevse_wifi_v1_16mb
          - native_openevse

    steps:
    - uses: ammaraskar/gcc-problem-matcher@master

    - uses: actions/checkout@v7

    - name: Cache pip
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache PlatformIO
      uses: actions/cache@v5
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: Install Avahi development libraries
      if: matrix.env == 'native_openevse'
      run: |
        sudo apt-get update
        sudo apt-get install -y libavahi-client-dev libavahi-common-dev libssl-dev

    - name: Run PlatformIO
      run: pio run -e ${{ matrix.env }}

    - name: Upload output to GitHub
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.env }}.bin
        path: .pio/build/${{ matrix.env }}/*.bin

    - name: Upload native output to GitHub
      if: matrix.env == 'native_openevse'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.env }}.program
        path: .pio/build/${{ matrix.env }}/program

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'master' || startsWith(github.ref_name, 'v')

    steps:
    - name: Download the built assets
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Rename images to something more sensible
      run: |
        find artifacts -name 'firmware.bin' | while read -r image; do
          dir=$(dirname "${image}")
          board=$(basename "${dir}")
          echo mv "$image" "$board"
          mv "$image" "$board"
        done

    - name: Get the bootloader and partition files
      run: |
        for i in openevse_wifi_tft_v1:16mb openevse_wifi_v1:4mb openevse_wifi_v1_16mb:v1_16mb; do
          env=$(cut -f1 -d: <<< $i)
          name=$(cut -f2 -d: <<< $i)
          mv artifacts/$env.bin/bootloader.bin bootloader_$name.bin
          mv artifacts/$env.bin/partitions.bin partitions_$name.bin
        done

    - name: Generate 16MB migration manifest
      # Self-consistent {app, bootloader, partitions} triple from the SAME
      # (core-3) openevse_wifi_v1_16mb build, consumed by the firmware's
      # "Expand partition to 16MB" tool. URLs point at this release; keep the
      # firmware's MIGRATE_MANIFEST_URL pointed at the same repo/release.
      run: |
        if [ "${{ github.ref_name }}" = "master" ]; then TAG=latest; else TAG="${{ github.ref_name }}"; fi
        BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/${TAG}"
        app_sha=$(sha256sum openevse_wifi_v1_16mb.bin | cut -d' ' -f1)
        bl_sha=$(sha256sum bootloader_v1_16mb.bin | cut -d' ' -f1)
        pt_sha=$(sha256sum partitions_v1_16mb.bin | cut -d' ' -f1)
        cat > migrate_v1_16mb.json <<EOF
        {
          "target": "openevse_wifi_v1_16mb",
          "target_partitions": "openevse_16mb",
          "flash_size": "16MB",
          "app": { "url": "${BASE}/openevse_wifi_v1_16mb.bin", "sha256": "${app_sha}" },
          "bootloader": { "url": "${BASE}/bootloader_v1_16mb.bin", "sha256": "${bl_sha}" },
          "partitions": { "url": "${BASE}/partitions_v1_16mb.bin", "sha256": "${pt_sha}" }
        }
        EOF
        cat migrate_v1_16mb.json

    - name: Upload assets to latest release
      if: github.ref_name == 'master'
      uses: "softprops/action-gh-release@v3"
      with:
        prerelease: true
        tag_name: latest
        name: Development Build
        generate_release_notes: true
        files: |
          *.bin
          migrate_v1_16mb.json

    - name: Upload assets to release
      if: startsWith(github.ref_name, 'v')
      uses: "softprops/action-gh-release@v3"
      with:
        prerelease: true
        name: "${{ github.ref_name }}"
        files: |
          *.bin
          migrate_v1_16mb.json
