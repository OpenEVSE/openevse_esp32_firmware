# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build/Release OpenEVSE

permissions:
  contents: write
  checks: write
  pull-requests: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Dump the environment
        run: echo "Environment variables:" && env | sort

      - name: Dump the event
        run: cat $GITHUB_EVENT_PATH

      - name: Dump github.ref_name
        run: echo "github.ref_name = '${{ github.ref_name }}'"

  test:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Cache pip
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.x'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: Run native unit tests
      run: |
        mkdir -p doctest_results
        # PlatformIO builds all test suites to the same .pio/build/native_test/program
        # path (no per-suite subdirectory), so run each suite individually to capture
        # JUnit output before the binary is overwritten by the next suite.
        for suite_dir in test/test_*/; do
          name=$(basename "$suite_dir")
          pio test -e native_test -f "$name" --without-testing
          .pio/build/native_test/program --reporters=junit --out="doctest_results/${name}.xml"
        done

    - name: Upload test results
      uses: actions/upload-artifact@v7
      with:
        name: pio_test_results
        path: doctest_results/

    - name: Publish Unit Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: doctest_results/*.xml
        check_name: Unit Tests

  build:
    name: Build ${{ matrix.env }}
    runs-on: ubuntu-latest

    env:
      # Environments whose Arduino core (core-3.x / pioarduino / IDF5) provides
      # the signed-update verifier. Signed OTA is only enforced on these; add
      # future core-3.x envs here. Older-core (4MB) envs cannot verify and are
      # left unsigned.
      SIGNED_OTA_ENVS: '["openevse_wifi_v1_16mb"]'
      # 'true' only when the image-signing key is configured. Keeps signed OTA
      # dormant (builds unchanged, unsigned) until the OTA_SIGNING_KEY secret is
      # added, so merging this does not alter the fleet's update behaviour.
      SIGN_ENABLED: ${{ secrets.OTA_SIGNING_KEY != '' }}

    strategy:
      fail-fast: false
      matrix:
        env:
          - nodemcu-32s
          - espressif_esp-wrover-kit
          - espressif_esp-wrover-kit_latest
          - adafruit_huzzah32_dev
          - adafruit_huzzah32
          - adafruit_featheresp32
          - openevse_wifi_v1
          - olimex_esp32-gateway-old
          - olimex_esp32-gateway-e
          - olimex_esp32-gateway-f
          - olimex_esp32-gateway-e_dev
          - olimex_esp32-gateway-f_dev
          - olimex_esp32-poe-iso
          - heltec_esp32-wifi-lora-v2
          - wt32-eth01
          - esp32-c3-devkitc-02
          - elecrow_esp32_hmi
#          - elecrow_esp32_hmi_dev
          - openevse_wifi_tft_v1
          - openevse_wifi_tft_v1_dev
          # core-3.x (pioarduino / IDF5) — 16MB+ boards
          - openevse_wifi_v1_16mb
          - native_openevse

    steps:
    - uses: ammaraskar/gcc-problem-matcher@master

    - uses: actions/checkout@v7

    - name: Cache pip
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache PlatformIO
      uses: actions/cache@v6
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.x'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: Install Avahi development libraries
      if: matrix.env == 'native_openevse'
      run: |
        sudo apt-get update
        sudo apt-get install -y libavahi-client-dev libavahi-common-dev libssl-dev

    - name: Run PlatformIO
      env:
        # Enforce signed OTA only when a signing key is configured AND this is a
        # signed-capable env. Dormant (unsigned, unchanged) until the
        # OTA_SIGNING_KEY secret is added, so merging this does not alter the
        # fleet's update behaviour on its own.
        PLATFORMIO_BUILD_FLAGS: ${{ (env.SIGN_ENABLED == 'true' && contains(fromJSON(env.SIGNED_OTA_ENVS), matrix.env)) && '-DUPDATE_SIGN -DREQUIRE_SIGNED_OTA' || '' }}
      run: pio run -e ${{ matrix.env }}

    - name: Sign firmware image
      # Append the RSA-2048 PSS signature trailer expected by REQUIRE_SIGNED_OTA
      # builds. Same gating as the build flags above.
      if: ${{ env.SIGN_ENABLED == 'true' && contains(fromJSON(env.SIGNED_OTA_ENVS), matrix.env) }}
      env:
        OTA_SIGNING_KEY: ${{ secrets.OTA_SIGNING_KEY }}
      run: |
        pip install cryptography
        python scripts/sign_firmware.py --key-env OTA_SIGNING_KEY \
          ".pio/build/${{ matrix.env }}/firmware.bin" ".pio/build/${{ matrix.env }}/firmware.bin"

    - name: Upload output to GitHub
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.env }}.bin
        path: .pio/build/${{ matrix.env }}/*.bin

    - name: Upload native output to GitHub
      if: matrix.env == 'native_openevse'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.env }}.program
        path: .pio/build/${{ matrix.env }}/program

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'master' || startsWith(github.ref_name, 'v')

    steps:
    - name: Checkout (with the migrator submodule)
      uses: actions/checkout@v7
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.x'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: Download the built assets
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Rename images to something more sensible
      run: |
        find artifacts -name 'firmware.bin' | while read -r image; do
          dir=$(dirname "${image}")
          board=$(basename "${dir}")
          echo mv "$image" "$board"
          mv "$image" "$board"
        done

    - name: Get the bootloader and partition files
      run: |
        for i in openevse_wifi_tft_v1:16mb openevse_wifi_v1:4mb openevse_wifi_v1_16mb:v1_16mb; do
          env=$(cut -f1 -d: <<< $i)
          name=$(cut -f2 -d: <<< $i)
          mv artifacts/$env.bin/bootloader.bin bootloader_$name.bin
          mv artifacts/$env.bin/partitions.bin partitions_$name.bin
        done

    - name: Build the 16MB migrator
      # The protected bootloader/partition-table commit OpenEVSE-4MB cannot do
      # from Arduino is delegated to a tiny ESP-IDF migrator app built with
      # DANGEROUS_WRITE_ALLOWED. It embeds the 16MB bootloader + partition table
      # (regenerated here from this build) and is OTA'd into a slot at migration
      # time. See docs/flash_migrate_repartition.md.
      run: |
        mkdir -p migrator/_embed
        cp bootloader_v1_16mb.bin migrator/_embed/bootloader.bin
        cp partitions_v1_16mb.bin migrator/_embed/partitions.bin
        python migrator/scripts/gen_embeds.py migrator/_embed
        ( cd migrator && pio run -e esp32dev )
        cp migrator/.pio/build/esp32dev/firmware.bin openevse_migrator.bin

    - name: Generate 16MB migration manifest
      # { app, migrator }: the normal 16MB OpenEVSE app (staged to ota_1) plus the
      # migrator that performs the protected commit. The migrator carries the
      # bl/PT, so they are not downloaded separately. URLs point at this release;
      # keep the firmware's MIGRATE_MANIFEST_URL pointed at the same repo/release.
      run: |
        if [ "${{ github.ref_name }}" = "master" ]; then TAG=latest; else TAG="${{ github.ref_name }}"; fi
        BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/${TAG}"
        app_sha=$(sha256sum openevse_wifi_v1_16mb.bin | cut -d' ' -f1)
        mig_sha=$(sha256sum openevse_migrator.bin | cut -d' ' -f1)
        cat > migrate_v1_16mb.json <<EOF
        {
          "target": "openevse_wifi_v1_16mb",
          "target_partitions": "openevse_16mb",
          "flash_size": "16MB",
          "app":      { "url": "${BASE}/openevse_wifi_v1_16mb.bin", "sha256": "${app_sha}" },
          "migrator": { "url": "${BASE}/openevse_migrator.bin",     "sha256": "${mig_sha}" }
        }
        EOF
        cat migrate_v1_16mb.json

    - name: Upload assets to latest release
      if: github.ref_name == 'master'
      uses: "softprops/action-gh-release@v3"
      with:
        prerelease: true
        tag_name: latest
        name: Development Build
        generate_release_notes: true
        files: |
          *.bin
          migrate_v1_16mb.json

    - name: Upload assets to release
      if: startsWith(github.ref_name, 'v')
      uses: "softprops/action-gh-release@v3"
      with:
        prerelease: true
        name: "${{ github.ref_name }}"
        files: |
          *.bin
          migrate_v1_16mb.json
