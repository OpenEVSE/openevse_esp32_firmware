[env:openevse_p4]
; Guition JC4880P443C: ESP32-P4 + ESP32-C6 (WiFi/BLE via ESP-Hosted/SDIO).
; Core-3 board bring-up: core firmware only — NO display/LVGL, NO peripherals yet.
board = esp32-p4-evboard
platform = ${common.platform_core3}
build_flags =
  ${common.build_flags}
  ${common.src_build_flags}
  ${common.debug_flags}
  ; RAPI -> on-board "MX1.25 4P UART" connector J5 (interface #9), the P4's 2nd UART.
  ; Chosen over UART0/CN2 (#7) because CN2 also carries the ROM boot console (TX0_BOOT),
  ; which would inject bootloader chatter into the controller; J5 has none.
  ; Schematic (JC4880P443_V1.0): P4 pin45 GPIO26 = net TX1, pin46 GPIO27 = net RX1.
  ; Arduino Serial1 defaults: RX1 = receive pin, TX1 = transmit pin (HardwareSerial.cpp).
  ; Wire J5 TX1(GPIO26) -> OpenEVSE RX, RX1(GPIO27) <- OpenEVSE TX.
  ; CAVEAT: this same UART net also feeds the on-board MAX485 (485 connector J4/#10).
  ; When using the J5 TTL header, ensure the MAX485 is disabled (DE/RE) or isolated via
  ; the 0R jumpers (R70/R75) so its RO output does not contend on GPIO27/RX.
  -D RAPI_PORT=Serial1
  -D RX1=27
  -D TX1=26
  ; Debug/console -> USB-CDC over the Type-C (keeps RAPI UART clean for the controller).
  -D DEBUG_PORT=Serial
  ; --- D1 LVGL display bring-up (ST7701 MIPI-DSI + GT911) ---
  -D ENABLE_SCREEN_LVGL
  -D LV_CONF_INCLUDE_SIMPLE
  -D LV_CONF_SUPPRESS_DEFINE_CHECK
  -I src/display_p4
  -I src/display_p4/lcd
  -I src/display_p4/touch
lib_deps =
  ${common.lib_deps}
  lvgl/lvgl@^8.3.9
board_build.partitions = ${common.build_partitions_16mb}
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.flash_mode = qio
