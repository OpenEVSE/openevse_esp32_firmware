[env]
# specify exact Arduino ESP SDK version, requires platformio 3.5+ (curently dev version)
# http://docs.platformio.org/en/latest/projectconf/section_env_general.html#platform
#platform = https://github.com/platformio/platform-espressif32.git#feature/stage
#platform = https://github.com/platformio/platform-espressif32.git#develop
#platform = espressif32@1.11.1
# Default platform: core-2.x (Arduino-ESP32 2.x / ESP-IDF 4.4). Serves all the
# 4MB boards, restoring their original dual-OTA behaviour. The 16MB TFT envs
# (and a future P4 env) override this with ${common.platform_core3}.
# See docs/superpowers/specs/2026-05-30-esp32-p4-port-design.md
platform = espressif32@6.12.0
#framework = arduino, espidf
framework = arduino
lib_deps = ${common.lib_deps}
lib_ignore = ${common.lib_ignore}
build_flags = ${common.build_flags}
#upload_port = openevse.local
upload_speed = 921600
extra_scripts = ${common.extra_scripts}
board_build.partitions = ${common.build_partitions}
#platform_packages =
#  ; use a special branch
#  framework-arduinoespressif32 @ https://github.com/marcovannoord/arduino-esp32.git#idf-release/v4.0
#    platformio/framework-arduinoespressif32 @ ~3.10006.0
monitor_speed = 115200
monitor_filters =
  esp32_exception_decoder

