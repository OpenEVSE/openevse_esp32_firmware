<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OpenEVSE Interactive Simulations</title>
  <script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
  <script src="simulations.js?v=20260604d"></script>
  <link rel="stylesheet" href="simulations.css" />
</head>
<body>
  <h1>OpenEVSE Interactive Simulations</h1>
  <p><a href="view.html">View mode</a></p>

  <form id="overrides-form">
    <label>divert_PV_ratio <input name="divert_PV_ratio" type="number" step="0.1" value="1.1" /></label><br />
    <label>divert_attack_smoothing_time <input name="divert_attack_smoothing_time" type="number" value="20" /></label><br />
    <label>divert_decay_smoothing_time <input name="divert_decay_smoothing_time" type="number" value="600" /></label><br />
    <label>divert_min_charge_time <input name="divert_min_charge_time" type="number" value="600" /></label><br />
    <label>current_shaper_max_pwr <input name="current_shaper_max_pwr" type="number" value="5000" /></label><br />
    <label>current_shaper_smoothing_time <input name="current_shaper_smoothing_time" type="number" value="60" /></label><br />
    <label>current_shaper_min_pause_time <input name="current_shaper_min_pause_time" type="number" value="300" /></label><br />
    <label>current_shaper_data_maxinterval <input name="current_shaper_data_maxinterval" type="number" value="120" /></label><br />
    <button type="submit">Run</button>
  </form>

  <div id="status"></div>
  <div id="content"></div>

  <script>
    function collectOverrides() {
      const form = document.getElementById("overrides-form");
      const values = Object.fromEntries(new FormData(form).entries());
      const overrides = {};
      Object.keys(values).forEach((k) => {
        const n = Number(values[k]);
        overrides[k] = Number.isNaN(n) ? values[k] : n;
      });
      return overrides;
    }

    async function runInteractive() {
      const status = document.getElementById("status");
      try {
        status.textContent = "Running scenarios...";
        await runInteractiveSimulation(collectOverrides());
        status.textContent = "Completed.";
        await renderIndex("content", "interactive");
      } catch (err) {
        status.textContent = String(err);
      }
    }

    document.getElementById("overrides-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      await runInteractive();
    });

    runInteractive();
  </script>
</body>
</html>
