<!DOCTYPE html>
<html>

<head>
  <title>OpenEVSE Simulations Results</title>
  <script type="text/javascript" src="https://canvasjs.com/assets/script/jquery-1.11.1.min.js"></script>
  <script type="text/javascript" src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.24.0/moment.min.js"></script>
  <script type="text/javascript" src="simulations.js"></script>
  <script type="text/javascript">
    var divert_profiles = [
      "master",
      "default",
      "noimport",
      "nowaste"
    ];

    var shaper_profiles = [
      "default",
      "3000w",
      "5000w",
      "8000w",
      "10000w",
      "smoothing_30s",
      "smoothing_120s",
      "minpause_60s",
      "minpause_600s",
      "maxinterval_30s",
      "maxinterval_120s",
      "aggressive",
      "conservative",
      "very_low_power",
      "very_high_power",
      "threephase"
    ];

    window.onload = function () {
      initPage(divert_profiles, shaper_profiles);
    };
  </script>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" />
  <link rel="stylesheet" href="simulations.css" />
</head>

<body>
  <div class="container-fluid sim-header">
    <h1>OpenEVSE Simulations Results <small><a href="interactive.html">Interactive</a></small></h1>
  </div>

  <div class="container-fluid">

    <!-- Tab navigation -->
    <ul class="nav nav-tabs sim-tab-nav" id="sim-tabs">
      <li class="active"><a href="#" data-tab="divert">Divert</a></li>
      <li><a href="#" data-tab="shaper">Shaper</a></li>
      <li><a href="#" data-tab="loadsharing">Load Sharing</a></li>
    </ul>

    <div class="tab-content sim-tab-content">

      <!-- Divert tab -->
      <div class="tab-pane active" id="tab-divert">
        <div class="sim-summary-section">
          <h3>Summary</h3>
          <div id="summary-divert" class="sim-summary-placeholder">
            <span class="glyphicon glyphicon-refresh sim-spinning"></span> Loading summary&hellip;
          </div>
        </div>
        <div class="sim-chart-controls">
          <label class="control-label">
            Profile:
            <select id="divert-profile-select" class="form-control input-sm sim-profile-select"
              onchange="onDivertProfileChange()"></select>
          </label>
        </div>
        <div id="divert-charts-container" class="sim-charts-grid"></div>
      </div>

      <!-- Shaper tab -->
      <div class="tab-pane" id="tab-shaper">
        <div class="sim-summary-section">
          <h3>Summary</h3>
          <div id="summary-shaper" class="sim-summary-placeholder">
            <span class="glyphicon glyphicon-refresh sim-spinning"></span> Loading summary&hellip;
          </div>
        </div>
        <div class="sim-chart-controls">
          <label class="control-label">
            Profile:
            <select id="shaper-profile-select" class="form-control input-sm sim-profile-select"
              onchange="onShaperProfileChange()"></select>
          </label>
        </div>
        <div id="shaper-charts-container" class="sim-charts-grid"></div>
      </div>

      <!-- Load Sharing tab -->
      <div class="tab-pane" id="tab-loadsharing">
        <div class="sim-summary-section">
          <h3>Summary</h3>
          <div id="summary-loadsharing" class="sim-summary-placeholder">
            <span class="glyphicon glyphicon-refresh sim-spinning"></span> Loading summary&hellip;
          </div>
        </div>
        <div id="loadsharing-charts-container" class="sim-charts-grid"></div>
      </div>

    </div><!-- /.tab-content -->
  </div><!-- /.container-fluid -->

</body>

</html>
